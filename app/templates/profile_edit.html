{% extends 'base.html' %}
{% block title %}Edit Profile — loophco{% endblock %}
{% block content %}
<div class="page" id="page-profile_edit">
  <div style="padding-top:var(--nav-h);min-height:100vh;background:var(--bg)">
    <div style="max-width:680px;margin:0 auto;padding:3rem clamp(1.5rem,4vw,2rem)">
      <button class="btn btn-g btn-sm" onclick="goToPage('profile')" style="margin-bottom:2rem">← Back to Profile</button>
      <h2 style="font-family:'Cormorant Garamond',serif;font-size:2.2rem;font-weight:300;margin-bottom:.4rem">Edit Profile</h2>
      <p style="font-size:.72rem;color:var(--text3);letter-spacing:.08em;margin-bottom:2.5rem">Update your personal information</p>
      {% if error %}
      <p style="margin-bottom:1rem;color:#ff6b6b;font-size:.8rem">{{ error }}</p>
      {% endif %}
      <form method="POST" action="{{ url_for('customer.edit_profile') }}" style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:2rem">
        <div class="profile-form-grid">
          <div class="form-grp profile-form-full"><label class="form-lbl">Full Name</label><input type="text" name="full_name" class="form-ctrl" value="{{ user.full_name or '' }}" placeholder="Full name"></div>
          <div class="form-grp profile-form-full"><label class="form-lbl">Email</label><input type="email" class="form-ctrl" value="{{ user.email }}" disabled></div>
          <div class="form-grp"><label class="form-lbl">Phone</label><input type="tel" name="phone_number" class="form-ctrl" value="{{ display_phone or '' }}" placeholder="09XXXXXXXXX"></div>
          <div class="form-grp"><label class="form-lbl">Default Payment Method</label><input type="text" name="default_payment_method" class="form-ctrl" value="{{ user.default_payment_method or '' }}" placeholder="cod or gcash"></div>
          <div class="form-grp profile-form-full"><label class="form-lbl">Shipping Address</label><input type="text" name="address" class="form-ctrl" value="{{ display_address or '' }}" placeholder="Street, City, Province"></div>
        </div>
        <div style="display:flex;gap:.75rem;margin-top:1.5rem">
          <button class="form-submit" style="flex:1;margin-top:0" type="submit">Save Changes</button>
          <button type="button" class="btn btn-g" onclick="goToPage('profile')">Cancel</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
